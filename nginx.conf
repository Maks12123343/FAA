# HTTP-only config — nginx -t passes immediately.
# After deploy: run  sudo certbot --nginx -d YOUR_DOMAIN
# Certbot rewrites this file and adds the HTTPS block + redirect automatically.

server {
    listen 80;
    server_name YOUR_DOMAIN_OR_IP;

    # Increase timeouts for long video generation (up to 10 min)
    proxy_read_timeout    600;
    proxy_connect_timeout 60;
    proxy_send_timeout    600;

    location / {
        proxy_pass http://127.0.0.1:5050;
        proxy_http_version 1.1;

        # Required for Socket.IO WebSocket upgrade
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
